<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Absolute Postion</title>
  </head>
  <style>
    div {
      border: solid 2px black;
      background-color: aqua;
    }

    #absolute-div {
      position: absolute;
      top: 40px;
      left: 30px;
      background-color: peru;
    }

    .tree {
      margin: 5px;
    }

    #parent {
      background-color: antiquewhite;
      position: relative;
      top: 30px;
      left: 40px;
    }

    #child-absolute {
      background-color: firebrick;
      position: absolute;
      top: 10px;
      left: 20px;
    }
  </style>
  <body>
    <div>Div1</div>
    <div id="absolute-div">Div2</div>
    <div>Div3</div>

    <br />
    <div class="tree" id="parent">
      Grandparent
      <div class="tree">
        Parent
        <div class="tree" id="child-absolute">child / current</div>
      </div>
    </div>
  </body>
</html>
