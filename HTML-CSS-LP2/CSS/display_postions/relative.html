<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relative Postion</title>
  </head>
  <style>
    div {
      border: solid 2px black;
      background-color: aqua;
    }

    /* Relative Moves for the original position */
    #relative-div {
      position: relative;
      top: 40px;
      left: 30px;
      background-color: peru;
    }
  </style>
  <body>
    <div>Div1</div>
    <div id="relative-div">Div2</div>
    <div>Div3</div>
  </body>
</html>
