<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        background-color: antiquewhite;
        border: solid 1px black;
        width: 300px;
        height: 300px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: 1fr 1fr 1fr 1fr;
        grid-template-areas:
          "div1 div1 div1 div1"
          "div2 div3 div5 div5"
          "div2 div3 div5 div5"
          "div4 div4 div4 div4 ";
      }

      .d1 {
        background-color: aqua;
        border: solid 1px black;
        grid-area: div1;
      }

      .d2 {
        background-color: purple;
        border: solid 1px black;
        grid-area: div2;
      }

      .d3 {
        border: solid 1px black;
        background-color: aquamarine;
        grid-area: div3;
      }

      .d4 {
        border: solid 1px black;
        background-color: green;
        grid-area: div4;
      }

      .d5 {
        background-color: pink;
        border: solid 1px black;
        grid-area: div5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="d1">1</div>
      <div class="d2">2</div>
      <div class="d3">3</div>
      <div class="d4">4</div>
      <div class="d5">5</div>
    </div>
  </body>
</html>
