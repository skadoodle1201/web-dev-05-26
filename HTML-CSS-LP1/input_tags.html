<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input type="text" />
    <br />
    <input type="button" value="Submit" />
    <button>By button tag</button>
    <br />
    <span
      >password ->> <input type="password" placeholder="Pass Input" />
    </span>
    <span>Number ->> <input type="number" value="100" /> </span>
    <br />
    <span>Date ->> <input type="date" /> Time ->><input type="time" /></span>

    <div>
      <div>
        <input type="checkbox" id="english" />
        <label for="english">Enlgish</label>
      </div>
      <div>
        <input type="checkbox" id="maths" />
        <label for="maths">Maths</label>
      </div>
      <div>
        <input type="checkbox" id="hindi" />
        <label for="hindi">Hindi</label>
      </div>
    </div>

    <div>
      <div>
        <input type="radio" name="gender" id="male" />
        <label for="male">Male</label>
      </div>
      <div>
        <input type="radio" name="gender" id="female" />
        <label for="female">Female</label>
      </div>
      <div>
        <input type="radio" name="gender" id="other" />
        <label for="other">Other</label>
      </div>
    </div>

    <br />
    <input type="color" value="#9400D3" />
  </body>
</html>
